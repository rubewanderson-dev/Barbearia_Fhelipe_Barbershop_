<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Agenda Premium</title>
<link rel="stylesheet" href="../style/main.css">
<style>
body {
  background: #0a0a0a;
  color: white;
  font-family: Arial;
}

h1 {
  text-align: center;
  color: #d4af37;
}

.cabecalho {
  display: grid;
  grid-template-columns: 60px repeat(7, 1fr);
  margin: 0 20px 10px;
  text-align: center;
  color: #d4af37;
  font-weight: bold;
}

.agenda {
  display: flex;
  margin: 20px;
}

.horas {
  width: 60px;
}

.horas div {
  height: 30px;
  font-size: 10px;
  display: flex;
  align-items: center;
  color: #777;
}

.dias {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(7, 1fr);
}

.coluna {
  position: relative;
  border-left: 1px solid #222;
}

.grade {
  position: absolute;
  inset: 0;
  display: grid;
  grid-template-rows: repeat(26, 30px);
  z-index: 1;
}

.linha {
  border-bottom: 1px solid #1a1a1a;
}

.linha.hora {
  border-bottom: 1px solid #444;
}

.conteudo {
  position: relative;
  display: grid;
  grid-template-rows: repeat(26, 30px);
  z-index: 2;
}

.card {
  background: linear-gradient(145deg, #000000, #444343);
  border: 1px solid #333;
  border-radius: 8px;
  padding: 4px;
  font-size: 8px;
  cursor: pointer;
  overflow: hidden;
}

.card:hover {
  border: 1px solid #d4af37;
}

/* POPUP */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(8px);
  opacity: 0;
  pointer-events: none;
  transition: 0.25s;
  z-index: 9998;
}

.overlay.ativo {
  opacity: 1;
  pointer-events: all;
}

.popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.9);
  width: 360px;
  max-width: 90%;
  background: #111;
  border: 1px solid #d4af37;
  border-radius: 14px;
  padding: 22px;
  color: white;
  opacity: 0;
  pointer-events: none;
  transition: 0.25s;
  z-index: 9999;
}

.popup.ativo {
  opacity: 1;
  pointer-events: all;
  transform: translate(-50%, -50%) scale(1);
}

.popup h3 {
  color: #d4af37;
  margin-bottom: 10px;
}

.info {
  display: flex;
  justify-content: space-between;
  margin-bottom: 6px;
  border-bottom: 1px solid #222;
  padding-bottom: 4px;
  font-size: 13px;
}

.status {
  margin-top: 10px;
  padding: 6px;
  text-align: center;
  border-radius: 6px;
  background: rgba(212,175,55,0.15);
  color: #d4af37;
}

.status.concluido {
  background: rgba(46,204,113,0.2);
  color: #2ecc71;
}

button {
  margin-top: 10px;
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

#concluir {
  background: #d4af37;
}

#fechar {
  background: #333;
  color: white;
}
.card.concluido {
  border: 1px solid #2ecc71;
  background: linear-gradient(145deg, #062b16, #0a3d20);
}

.card.concluido strong {
  color: #2ecc71;
}
</style>
</head>

<body>

<h1>AGENDAMENTOS</h1>
    <div>
      <nav>
      <ol>
        <li> <a href="../index.html">Inicio</a></li>
        <li><a href="servico.html">Serviços</a></li>
        <li><a href="agendamento.html">Agendar</a></li>
         <li><a href="produtos.html">Produtos</a></li>
        <li><a href="painelAgendamento.html">Agendados</a></li>
      
      </ol>
    </nav>
  </div>
<div class="cabecalho" id="cabecalho"></div>
<div class="agenda">
  <div class="horas" id="horas"></div>
  <div class="dias" id="dias"></div>
</div>

<div class="overlay" id="overlay"></div>
<div class="popup" id="popup">
  <div id="popupConteudo"></div>
</div>

<script type="module">
    
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


const app = initializeApp({
  apiKey: "AIzaSyD64nVKdxmTd3tNsgTMQ9HEal49AUVvIEs",
  authDomain: "barbearia-649d6.firebaseapp.com",
  projectId: "barbearia-649d6",
});

const db = getFirestore(app);

const horasDiv = document.getElementById("horas");
const diasDiv = document.getElementById("dias");
const cabecalho = document.getElementById("cabecalho");
const overlay = document.getElementById("overlay");
const popup = document.getElementById("popup");
const popupConteudo = document.getElementById("popupConteudo");

const horaInicio = 8;
const horaFim = 21;

/* HORAS */
for (let h = horaInicio; h < horaFim; h++) {
  ["00", "30"].forEach(m => {
    const div = document.createElement("div");
    div.innerText = `${h.toString().padStart(2,"0")}:${m}`;
    horasDiv.appendChild(div);
  });
}

/* SEMANA */
const hoje = new Date();
const inicioSemana = new Date();
inicioSemana.setHours(0, 0, 0, 0);
inicioSemana.setDate(inicioSemana.getDate() - inicioSemana.getDay());
inicioSemana.setDate(hoje.getDate() - hoje.getDay());

const diasSemana = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];

cabecalho.appendChild(document.createElement("div"));
for (let i = 0; i < 7; i++) {
  const d = new Date(inicioSemana);
  d.setDate(d.getDate() + i);

  const el = document.createElement("div");
  el.innerText = `${diasSemana[d.getDay()]} ${d.getDate()}`;
  cabecalho.appendChild(el);
}

/* COLUNAS */
const colunas = [];

for (let i = 0; i < 7; i++) {
  const col = document.createElement("div");
  col.className = "coluna";

  const grade = document.createElement("div");
  grade.className = "grade";

  for (let j = 0; j < 26; j++) {
    const linha = document.createElement("div");
    linha.className = "linha";
    if (j % 2 === 0) linha.classList.add("hora");
    grade.appendChild(linha);
  }

  const conteudo = document.createElement("div");
  conteudo.className = "conteudo";

  col.appendChild(grade);
  col.appendChild(conteudo);

  diasDiv.appendChild(col);
  colunas.push(conteudo);
}

function min(h) {
  const [a,b] = h.split(":").map(Number);
  return a*60 + b;
}
async function horarioOcupado(data, hora) {
  const q = query(
    collection(db, "agendamentos"),
    where("data", "==", data),
    where("hora", "==", hora)
  );

  const snap = await getDocs(q);

  return !snap.empty;
}

/* FIREBASE */
onSnapshot(collection(db, "agendamentos"), (snap) => {

  colunas.forEach(c => c.innerHTML = "");

  snap.forEach((docSnap) => {
    const ag = docSnap.data();

  const [y, m, d] = ag.data.split("-").map(Number);
const data = new Date(y, m - 1, d);

const diff = Math.floor((data - inicioSemana) / (1000 * 60 * 60 * 24));

    if (diff < 0 || diff > 6) return;

    const inicio = min(ag.hora);
    const base = horaInicio * 60;

    const linhaInicio = Math.floor((inicio - base)/30) + 1;
    const tempoReal = Math.min(ag.tempo || 60, 90);
    const duracao = Math.ceil(tempoReal / 30);

 const card = document.createElement("div");
card.className = "card";

if (ag.status === "Concluído") {
  card.classList.add("concluido");
}

    card.style.gridRow = `${linhaInicio} / span ${duracao}`;

    card.innerHTML = `<strong>${ag.nome}</strong><br>${ag.hora}`;

    card.onclick = () => {

      popupConteudo.innerHTML = `
        <h3>${ag.nome}</h3>

        <div class="info"><span>Serviço</span><span>${ag.servico}</span></div>
        <div class="info"><span>Horário</span><span>${ag.hora}</span></div>
        <div class="info"><span>Telefone</span><span>${ag.telefone || '-'}</span></div>

        <div class="status ${ag.status === "Concluído" ? "concluido" : ""}">
          ${ag.status || "Pendente"}
        </div>

        <button id="concluir">✔ Concluir</button>
        <button id="fechar">Fechar</button>
      `;

      overlay.classList.add("ativo");
      popup.classList.add("ativo");

      const btnFechar = document.getElementById("fechar");
      const btnConcluir = document.getElementById("concluir");

      btnFechar.onclick = () => {
        overlay.classList.remove("ativo");
        popup.classList.remove("ativo");
      };

      btnConcluir.onclick = async () => {
        await updateDoc(doc(db, "agendamentos", docSnap.id), {
          status: "Concluído"
        });

        overlay.classList.remove("ativo");
        popup.classList.remove("ativo");
      };
    };

    colunas[diff].appendChild(card);
  });
});

overlay.onclick = () => {
  overlay.classList.remove("ativo");
  popup.classList.remove("ativo");
};
</script>

</body>
</html>
