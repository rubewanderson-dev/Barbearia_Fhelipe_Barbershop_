<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SERVIÇOS</title>

<link rel="stylesheet" href="../style/main.css">
<link rel="stylesheet" href="../style/servico.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">


<link rel="apple-touch-icon" sizes="180x180" href="../favicon/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="../favicon/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="../favicon/favicon-16x16.png">


<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#d4af37">

</head>

<body>

<header>
  <div class="nomeDaBarbearia"><h1>FHELIPE BARBERSHOP</h1></div>
  <nav>
    <ol>
      <li><a href="../index.html">Inicio</a></li>
      <li><a href="servico.html">Serviços</a></li>
      <li><a href="agendamento.html">Agendar</a></li>
       <li><a href="produtos.html">Produtos</a></li>
      <li><a href="painelAgendamento.html">Agendados</a></li>
   
    </ol>
  </nav>
</header>

<main>

<!-- CORTES -->
<div id="servico">

  <section data-nome="Corte Americano" data-valor="40" data-tempo="40">
    <img src="../imagens/corte-americano.jpeg">
    <h2>Corte Americano</h2>
    <p class="preco">R$ 40,00</p>
  </section>

  <section data-nome="Corte Social" data-valor="35" data-tempo="40">
     <img src="../imagens/logo.png">
    <h2>Corte Social</h2>
    <p class="preco">R$ 35,00</p>
  </section>


  <section data-nome="Corte Militar" data-valor="35" data-tempo="40">
   <img src="../imagens/corte-militar.jpeg">
    <h2>Corte <strong>Militar</strong></h2>
    <p class="preco">R$ 40,00</p>
  </section>

  <section data-nome="Barba estilo lenhador" data-valor="35" data-tempo="40">
    <img src="../imagens/Barba-lenhador.jpeg">
    <h2>Barba estilo <strong>lenhador</strong></h2>
    <p class="preco">R$ 35,00</p>
  </section>

   <section data-nome="Barba estilo degradê" data-valor="35" data-tempo="40">
    <img src="../imagens/barba-degradê.jpeg">
    <h2>Barba estilo <strong>degradê</strong></h2>
    <p class="preco">R$ 35,00</p>
  </section>

</div>

<!-- EXTRAS -->
<div class="extras">

  <label data-nome="Barba" data-info="+40min • R$35,00">
    <input type="checkbox" data-nome="Barba" data-valor="35" data-tempo="40">
    <span>Acabamento completo na barba</span>
  </label>
  
  <label data-nome="Sobrancelha" data-info="+10min • R$15,00">
    <input type="checkbox" data-nome="Sobrancelha" data-valor="15" data-tempo="10">
    <span>Design alinhado</span>
  </label>

</div>

<!-- RESUMO -->
<div class="resumo">
  <p id="total">Total: R$ 00</p>
  <p id="tempo">Tempo: 0 min</p>
</div>

<!-- BOTÃO -->
<button id="continuar">CONTINUAR AGENDAMENTO</button>

</main>


<script src="../javascript/servico.js"></script>

</body>
</html>
